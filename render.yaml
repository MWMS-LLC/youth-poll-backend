services:
  # Backend API Service
  - type: web
    name: youth-poll-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: youth-poll-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # Frontend Static Site
  - type: web
    name: youth-poll-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://youth.myworldmysay.com/api

databases:
  # PostgreSQL Database
  - name: youth-poll-db
    databaseName: youth_poll_prod
    user: youth_poll_user
    plan: free

services:
  # Shared Backend API Service (serves all sites)
  - type: web
    name: youth-poll-backend
    env: python
    plan: free
    buildCommand: |
      export CARGO_HOME=/tmp/cargo
      export RUSTUP_HOME=/tmp/rustup
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: youth-poll-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CARGO_HOME
        value: /tmp/cargo
      - key: RUSTUP_HOME
        value: /tmp/rustup

  # Youth Site Frontend
  - type: web
    name: youth-poll-frontend
    env: static
    plan: free
    buildCommand: cd youth-poll-frontend && npm install && npm run build
    staticPublishPath: ./youth-poll-frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://youth-poll-backend.onrender.com

  # Teen Site Frontend
  - type: web
    name: teen-poll-frontend
    env: static
    plan: free
    buildCommand: cd teen-poll-frontend && npm install && npm run build
    staticPublishPath: ./teen-poll-frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://youth-poll-backend.onrender.com

  # Parents Site Frontend
  - type: web
    name: parents-poll-frontend
    env: static
    plan: free
    buildCommand: cd parents-poll-frontend && npm install && npm run build
    staticPublishPath: ./parents-poll-frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://youth-poll-backend.onrender.com

  # Schools Site Frontend
  - type: web
    name: schools-poll-frontend
    env: static
    plan: free
    buildCommand: cd schools-poll-frontend && npm install && npm run build
    staticPublishPath: ./schools-poll-frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://youth-poll-backend.onrender.com

databases:
  # Shared PostgreSQL Database
  - name: youth-poll-db
    databaseName: youth_poll_prod
    user: youth_poll_user
    plan: free


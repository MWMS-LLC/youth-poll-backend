services:
  - type: web
    name: youth-poll-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: youth-poll-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: youth-poll-db
    databaseName: youth_poll
    user: youth_poll_user

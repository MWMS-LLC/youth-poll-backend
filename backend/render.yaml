services:
  - type: web
    name: youth-poll-backend
    env: python
    plan: free
    buildCommand: |
      export CARGO_HOME=/tmp/cargo
      export RUSTUP_HOME=/tmp/rustup
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: youth-poll-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CARGO_HOME
        value: /tmp/cargo
      - key: RUSTUP_HOME
        value: /tmp/rustup

databases:
  - name: youth-poll-db
    databaseName: youth_poll_prod
    user: youth_poll_user
    plan: free


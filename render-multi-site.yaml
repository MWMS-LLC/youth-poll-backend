services:
  # Shared Backend API Service (serves all sites)
  - type: web
    name: youth-poll-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: youth-poll-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  # Youth Site Frontend
  - type: web
    name: youth-poll-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://youth.myworldmysay.com/api

  # Teen Site Frontend
  - type: web
    name: teen-poll-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://teen.myworldmysay.com/api

  # Parents Site Frontend
  - type: web
    name: parents-poll-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://parents.myworldmysay.com/api

  # Schools Site Frontend
  - type: web
    name: schools-poll-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://schools.myworldmysay.com/api

databases:
  # Shared PostgreSQL Database
  - name: youth-poll-db
    databaseName: youth_poll_prod
    user: youth_poll_user
    plan: free

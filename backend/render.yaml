services:
  - type: web
    name: youth-poll-api
    env: python
    buildCommand: |
      export CARGO_HOME=/tmp/cargo
      export RUSTUP_HOME=/tmp/rustup
      pip install -r requirements.txt
    startCommand: python ../start_backend.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: youth-poll-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: CARGO_HOME
        value: /tmp/cargo
      - key: RUSTUP_HOME
        value: /tmp/rustup

databases:
  - name: youth-poll-db
    databaseName: youth_poll
    user: youth_poll_user

